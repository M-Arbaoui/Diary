version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: mydiary-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - mydiary-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mydiary-backend
    restart: unless-stopped
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/mydiary
      CORS_ORIGIN: http://localhost:8080
    depends_on:
      - mongo
    ports:
      - "5000:5000"
    networks:
      - mydiary-net

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: mydiary-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
    networks:
      - mydiary-net

volumes:
  mongo_data:

networks:
  mydiary-net:
    driver: bridge
